[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
markers =
    slow: tests that take >1s (deselect with '-m "not slow"')
    integration: end-to-end integration tests
    math: mathematical invariant tests
